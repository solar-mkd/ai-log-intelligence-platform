# LogLens source configuration (example).
#
# Copy this file to config/config.yaml (git-ignored) and edit it for your
# environment. Each entry under `sources:` defines one log source; pipeline
# steps look it up by its source id (the key), e.g.:
#
#   python -m loglens.pipeline.landing_bronze --source-id windows_service_1
#   python -m loglens.pipeline.silver         --source-id windows_service_1
#
# Secrets are NOT stored here. The database DSN comes from LOGLENS_DB_DSN, and
# the PII HMAC key from LOGLENS_PII_HMAC_KEY (see docs/SETUP.md).

sources:

  # A production source: its PII fields are obfuscated (ADR-015).
  windows_service_1:
    log_type: windows_service               # selects the parser
    location: data/raw/windows_service_1     # directory of log files
    timezone: Australia/Brisbane             # IANA zone (for UTC normalization)
    # header_pattern: "..."                  # optional; parser default if omitted
    # earliest_date: "2026-01-01"            # optional; cutoff for the FIRST import
    pii_policy:                              # optional; per-field actions
      User: hmac                             #   hmac   = keyed pseudonymisation
      Country: hmac                          #   redact = irreversible removal
      Account Id: redact                     #   (encrypt = reserved, not yet impl.)

  # A test source of the SAME log type, with NO pii_policy — values left as-is.
  # (Demonstrates that PII handling is per-source, not per-log-type.)
  windows_service_2:
    log_type: windows_service
    location: data/raw/windows_service_2
    timezone: Australia/Brisbane
